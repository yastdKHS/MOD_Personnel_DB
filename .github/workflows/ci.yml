# CI: lint / 型チェック / テスト
#
# 設計方針: docs/adr/0010-ci-cd-and-publish-strategy.md
#
# 現在 src/ にはまだ実装コードが存在しない（設計フェーズ）。
# そのためコード対象が存在しないジョブはスキップし、CIを恒常的に赤くしない。
# 実装が src/ に追加され次第、自動的にチェック対象となる。

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check if source code exists yet
        id: has_code
        run: |
          if [ -n "$(find src -name '*.py' 2>/dev/null)" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dev dependencies
        if: steps.has_code.outputs.present == 'true'
        run: pip install -e ".[dev]"

      - name: Ruff lint
        if: steps.has_code.outputs.present == 'true'
        run: ruff check .

      - name: Ruff format check
        if: steps.has_code.outputs.present == 'true'
        run: ruff format --check .

      - name: mypy
        if: steps.has_code.outputs.present == 'true'
        run: mypy

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check if tests exist yet
        id: has_tests
        run: |
          if [ -n "$(find tests -name 'test_*.py' 2>/dev/null)" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install package with dev dependencies
        if: steps.has_tests.outputs.present == 'true'
        run: pip install -e ".[dev]"

      - name: Run pytest
        if: steps.has_tests.outputs.present == 'true'
        run: pytest --cov
