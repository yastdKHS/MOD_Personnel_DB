# CI: lint / 型チェック / テスト
#
# 設計方針: docs/adr/0010-ci-cd-and-publish-strategy.md
#
# src/・tests/ は実装済み（現状はdocs/reports/phase5-final-audit.mdを参照）。
# 各ジョブは常にlint・型チェック・テストを実行する。

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest --cov
