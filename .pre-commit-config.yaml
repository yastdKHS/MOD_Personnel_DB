# .pre-commit-config.yaml
#
# コミット前に走る静的チェック群。CI（.github/workflows/ci.yml）と同じ
# チェックをローカルで先に検出することで、レビュー待ち時間を減らす。
#
# セットアップ: `pre-commit install`（CONTRIBUTING.md 参照）

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
        # sample_pdfs/ の大容量ファイル混入を早期検知する目的も兼ねる。
      - id: check-yaml
      - id: check-toml
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: []
        # src/ が存在しない段階では対象ファイルがないため実質的に no-op。

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        # 人事データ・PDF出典URL・APIキー等の誤コミットを検知する。
